name: Update Publications

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 6am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch publications from ADS
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
        run: |
          curl -sf \
            "https://api.adsabs.harvard.edu/v1/search/query?q=author%3A%22To%2C+Chun-Hao%22+database%3Aastronomy&fl=title,author,year,bibcode,abstract,identifier,pub,volume,page&sort=date+desc&rows=250" \
            -H "Authorization: Bearer $ADS_TOKEN" \
            | python3 -c "
import json, sys
d = json.load(sys.stdin)
print(json.dumps(d['response']['docs'], ensure_ascii=False, indent=2))
" > assets/data/publications.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/publications.json
          git diff --staged --quiet || git commit -m "Update publications from ADS"
          git push
